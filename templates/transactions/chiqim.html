{% extends 'base.html' %}

{% block title %}Chiqim Operatsiyasi - Ombor Tizimi{% endblock %}

{% block extra_css %}
<style>
    .form-group {
        margin-bottom: 2rem;
    }

    label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
    }

    input, select {
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        padding: 0.875rem 1rem;
        color: var(--text-main);
        font-size: 1rem;
        transition: all 0.2s;
    }

    input:focus, select:focus {
        outline: none;
        border-color: var(--error);
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
    }

    .btn-submit {
        background: var(--error);
        color: white;
        border: none;
        padding: 1rem 1.5rem;
        border-radius: 0.75rem;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        width: 100%;
        transition: all 0.2s;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
    }

    .btn-submit:hover {
        opacity: 0.9;
        transform: translateY(-2px);
    }
</style>
{% endblock %}

{% block content %}
<div class="header-actions" style="margin-bottom: 2rem;">
    <a href="{{ url_for('products.list_products') }}" style="color: var(--text-muted); text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.25rem; margin-bottom: 1rem;">
        <i class="fas fa-chevron-left"></i> Orqaga qaytish
    </a>
    <h1><i class="fas fa-arrow-right-from-bracket" style="color: var(--error); margin-right: 0.5rem;"></i> Mahsulot Chiqimi</h1>
</div>

<div class="glass-card" style="max-width: 600px; margin: 0 auto; padding: 2.5rem;">
    <form action="{{ url_for('transactions.chiqim') }}" method="POST">
        <div class="form-group">
            <label for="product_id"><i class="fas fa-box"></i> Mahsulotni Tanlang</label>
            <select name="product_id" id="product_id" required>
                {% for product in products %}
                    <option value="{{ product.id }}" {% if request.args.get('product_id')|int == product.id %}selected{% endif %}>
                        {{ product.name }} (Hozirgi qoldiq: {{ product.quantity }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="amount"><i class="fas fa-minus"></i> Chiqim Miqdori</label>
            <input type="number" id="amount" name="amount" min="1" placeholder="Soni kiriting" required>
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-arrow-right-from-bracket"></i> Omborxonadan Chiqarish
        </button>
    </form>
</div>
{% endblock %}
