{% extends 'base.html' %}

{% block title %}Yangi Mahsulot Qo'shish - Ombor Tizimi{% endblock %}

{% block extra_css %}
<style>
    .form-group {
        margin-bottom: 2rem;
    }

    label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
    }

    input, select {
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        padding: 0.875rem 1rem;
        color: var(--text-main);
        font-size: 1rem;
        transition: all 0.2s;
    }

    input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .btn-submit {
        background: var(--primary);
        color: white;
        border: none;
        padding: 1rem 1.5rem;
        border-radius: 0.75rem;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        width: 100%;
        transition: all 0.2s;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
    }

    .btn-submit:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
    }

    .helper-text {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 0.4rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="header-actions" style="margin-bottom: 2rem;">
    <a href="{{ url_for('products.list_products') }}" style="color: var(--text-muted); text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.25rem; margin-bottom: 1rem;">
        <i class="fas fa-chevron-left"></i> Orqaga qaytish
    </a>
    <h1><i class="fas fa-plus-circle" style="color: var(--primary); margin-right: 0.5rem;"></i> Yangi Mahsulot Qo'shish</h1>
</div>

<div class="glass-card" style="max-width: 600px; margin: 0 auto; padding: 2.5rem;">
    <form action="{{ url_for('products.add_product') }}" method="POST">
        <div class="form-group">
            <label for="name"><i class="fas fa-tag"></i> Mahsulot Nomi</label>
            <input type="text" id="name" name="name" placeholder="Masalan: Pepsi 1.5L" required>
        </div>

        <div class="form-group">
            <label for="quantity"><i class="fas fa-sort-amount-up"></i> Boshlang'ich Miqdor</label>
            <input type="number" id="quantity" name="quantity" value="0" min="0">
        </div>

        <div class="form-group">
            <label for="min_quantity"><i class="fas fa-bell"></i> Minimal Miqdor (Alert)</label>
            <input type="number" id="min_quantity" name="min_quantity" value="10" min="1">
            <p class="helper-text">Qoldiq mahsulot ushbu miqdordan kamaysa, tizim sizni ogohlantiradi.</p>
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-save"></i> Mahsulotni Saqlash
        </button>
    </form>
</div>
{% endblock %}
